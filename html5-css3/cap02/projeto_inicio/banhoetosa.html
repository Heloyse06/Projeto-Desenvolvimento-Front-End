<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Formulário de Banho e Tosa</title>
</head>
<body>
    <a href="index.html">Home</a>
    <h1>Agendamento para banho e tosa</h1>
    <h2>Nossa equipe irá conferir sua solicitação e enviará uma confirmação para seu email.</h2>
    <fieldset>
        <legend>Identificação do dono do animal</legend>
        <br><div>
            <label for="Nome:">Nome:</label>
            <input type="text" name="Nome:" id="Nome:" placeholder="Digite o Nome do Dono">
        </div>
        <br>
        <div>
            <label for="Endereço:">Endereço:</label>
            <input type="text" name="Endereço:" id="Endereço:" placeholder="Digite seu Endereço">
        </div>
        <br>
        <div>
            <label for="CEP:">CEP:</label>
            <input type="number" name="CEP:" id="CEP:" placeholder="Digite seu CEP">
        </div>
        <br>
        <div>
            <label for="Email:">Email:</label>
            <input type="email" name="Email:" id="Email:" placeholder="Digite o Endereço de Email">  
        </div>
        <br>
        <div>
            <label for="Tel/Cel:">Tel/Cel:</label>
            <input type="tel" name="Tel/Cel:" id="Tel/Cel:" placeholder="99 99999-9999"> 
        </div>
        <br>
    </fieldset>
    <fieldset>
        <legend>Animal</legend>
        <br><div>
            <label for="Nome:">Nome:</label>
            <input type="text" name="Nome:" id="Nome:" placeholder="Digite o Nome do Animal"> 
        </div>
        <br><div>
            <label for="tamanho">Porte do Cão:</label>
            <input type="radio" name="tamanho" id="Pequeno">
            <label for="Pequeno">Pequeno</label>
            <input type="radio" name="tamanho" id="Médio">
            <label for="Médio">Médio</label>
            <input type="radio" name="tamanho" id="Grande">
            <label for="Grande">Grande</label>
        </div>
        <br><div>
            <label for="Tipo de tosa">Tipo de tosa</label>
            <select name="Opção1" id="Opção1">
                <option value="Nenhum">Nenhum</option>
                <option value="Tipo1">Tipo1</option>
                <option value="Tipo2">Tipo2</option>
                <option value="Tipo3">Tipo3</option>
                <option value="Tipo4">Tipo4</option>
                <option value="Tipo5">Tipo5</option>
            </select>
        </div>
        <br><div>
            <label for="Observações:">Observações:</label>
            <br>
            <textarea name="Observações" id="Observações" cols="110" rows="2" placeholder="Digite informações do animal caso precise"></textarea>
        </div>
    </fieldset>
    <fieldset>
        <legend>Horário - Obs: Não atendemos aos domingos e às segundas-feiras</legend>
        <br><div>
            Indique os dias de sua preferência:
            <br>
            <input type="checkbox" name="Terça-Feira" id="Terça-Feira">
            <label for="Terça-Feira">Terça-Feira</label>

            <input type="checkbox" name="Quarta-Feira " id="Quarta-Feira ">
            <label for="Quarta-Feira ">Quarta-Feira </label>

            <input type="checkbox" name="Quinta-Feira" id="Quinta-Feira ">
            <label for="Quinta-Feira ">Quinta-Feira </label>

            <input type="checkbox" name="Sexta-Feira" id="Sexta-Feira">
            <label for="Sexta-Feira">Sexta-Feira</label>

            <input type="checkbox" name="Sábado" id="Sábado">
            <label for="Sábado">Sábado</label>
        </div>
        <p><div>
            <label for="Primeira opção de horário:">Primeira opção de horário:</label>
            <input type="date" name="Primeira opção de horário" id="Primeira opção de horário">
        </div></p>
        <p><div>
            <label for="Segunda opção de horário:">Segunda opção de horário:</label>
            <input type="date" name="Segunda opção de horário" id="Segunda opção de horário">
        </div></p>
    </fieldset>
    <button><a href="fim.html">Enviar</a></button>
</body>
</html>
